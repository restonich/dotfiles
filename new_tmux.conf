# remap prefix from 'C-b' to 'C-p'
unbind C-b
unbind C-p
bind C-p send-prefix
set -g prefix C-p

# split panes using i and u
unbind '"'
unbind %
bind i split-window -h
bind u split-window -v

# switch panes using Alt-arrow without prefix
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Ctrl , and . to switch windows
bind -n M-, previous-window
bind -n M-. next-window

# Enable mouse mode
setw -g mode-mouse copy-mode
set -g mouse-resize-pane on
set -g mouse-select-pane on
set -g mouse-select-window on
set -g mouse-utf8 on

# To disable delay caused by ESC-as-Mod behavior
set -s escape-time 0

# Vi keybindings in select mode
setw -g mode-keys vi

# 'v' to start selection
#bind -T copy-mode-vi v send -X begin-selection

# 'y' copies to X clipboard (2nd one for no X host)
#bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xsel --input --clipboard'
#bind -T copy-mode-vi y send -X copy-selection-and-cancel

# 'Y' to copy line
#bind -T copy-mode-vi Y send -X copy-line

bind -t vi-copy v begin-selection
bind -t vi-copy y copy-selection

# Force 256 colors
set-option -g default-terminal "screen-256color"

