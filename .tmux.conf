# remap prefix from 'C-b' to 'C-a'
unbind C-b
unbind C-a
set-option -g prefix C-a
bind C-a send-prefix

# split panes using i and u
unbind '"'
unbind %
bind i split-window -h
bind u split-window -v

# switch panes using Alt-arrow without prefix
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Enable mouse mode
set -g mouse on

# To disable delay caused by ESC-as-Mod behavior
set -s escape-time 0

# Vi keybindings in select mode
setw -g mode-keys vi

# 'v' to start selection, 'y' copies to X clipboard
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xsel --input --clipboard'
